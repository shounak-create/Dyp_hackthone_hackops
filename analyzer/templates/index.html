<h1>GitHub Analyzer</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="repo_url" placeholder="Enter GitHub Repo">
    <button type="submit">Analyze</button>
</form>

{% if error %}
<p style="color:red;">Error: {{ error }}</p>
{% endif %}

{% if files %}
<h2>Fetched Files:</h2>

{% for file in files %}
    <h3>{{ file.name }}</h3>
    <pre>{{ file.content }}</pre>
{% endfor %}

{% endif %}
